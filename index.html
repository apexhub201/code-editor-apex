<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>APEX HUB - Code Script Editor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.2); }
        }

        .nav-links {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: linear-gradient(135deg, #667eea20, #764ba220);
            padding: 0.5rem 1rem;
            border-radius: 50px;
            border: 1px solid rgba(102, 126, 234, 0.3);
        }

        .username {
            font-weight: 600;
            color: #667eea;
        }

        .user-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            overflow: hidden;
        }
        
        .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .btn {
            padding: 0.6rem 1.5rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.95rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #667eea;
            color: #667eea;
        }

        .btn-outline:hover {
            background: #667eea;
            color: white;
        }

        .btn-danger {
            background: #ff4757;
            color: white;
        }

        .btn-danger:hover {
            background: #ff3838;
            transform: translateY(-2px);
        }

        .btn-success {
            background: #00d25b;
            color: white;
        }

        .btn-success:hover {
            background: #00b894;
        }

        .btn-logout {
            background: #ff4757;
            color: white;
        }

        .btn-logout:hover {
            background: #ff3838;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            width: 90%;
            max-width: 450px;
            position: relative;
            animation: slideIn 0.3s ease;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            max-height: 90vh;
            overflow-y: auto;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px) scale(0.9);
                opacity: 0;
            }
            to {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }

        .close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            font-size: 1.5rem;
            cursor: pointer;
            color: #999;
            transition: color 0.3s;
        }

        .close:hover {
            color: #333;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #333;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            background: #f0f0f0;
            padding: 0.5rem;
            border-radius: 50px;
        }

        .tab {
            flex: 1;
            padding: 0.7rem;
            border: none;
            background: transparent;
            cursor: pointer;
            font-weight: 600;
            border-radius: 50px;
            transition: all 0.3s;
            color: #666;
        }

        .tab.active {
            background: white;
            color: #667eea;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .welcome-section {
            text-align: center;
            color: white;
            margin-bottom: 2rem;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
        }

        .welcome-section h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            font-weight: 800;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .welcome-section p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .editor-section {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .script-info {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .script-name-input {
            flex: 1;
            min-width: 200px;
            padding: 1rem 1.2rem;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 500;
            transition: all 0.3s;
        }

        .script-name-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .editor-wrapper {
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 1.5rem;
            background: #1e1e2e;
        }

        .editor-header {
            background: #2d2d3a;
            padding: 0.8rem 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #404054;
            color: #fff;
        }

        .editor-header span {
            font-weight: 600;
            color: #667eea;
        }

        .editor-container {
            display: flex;
            height: 400px;
            overflow: hidden;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            line-height: 1.6;
            background: #1e1e2e;
        }

        .line-numbers {
            padding: 1rem 0.5rem;
            text-align: right;
            background: #2d2d3a;
            color: #8585a3;
            user-select: none;
            border-right: 1px solid #404054;
            min-width: 50px;
            overflow-y: auto;
            overflow-x: hidden;
            height: 100%;
        }

        .line-numbers div {
            padding: 0 0.5rem;
            white-space: nowrap;
        }

        .code-input {
            flex: 1;
            padding: 1rem;
            border: none;
            background: #1e1e2e;
            color: #f8f8f2;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            white-space: pre;
            overflow: auto;
            height: 100%;
            -webkit-overflow-scrolling: touch;
        }

        .code-input:focus {
            outline: none;
        }

        .editor-actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            flex-wrap: wrap;
        }

        .scripts-library {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .library-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .library-header h2 {
            color: #333;
            font-size: 1.8rem;
        }
        
        .search-box {
            padding: 0.8rem 1.2rem;
            border: 2px solid #e0e0e0;
            border-radius: 50px;
            font-size: 1rem;
            width: 300px;
            max-width: 100%;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }

        .search-box:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .scripts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .script-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 1.5rem;
            transition: all 0.3s;
            border: 2px solid transparent;
            position: relative;
        }

        .script-card:hover {
            transform: translateY(-5px);
            border-color: #667eea;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.2);
        }

        .script-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .script-card-header h3 {
            color: #333;
            font-size: 1.3rem;
            font-weight: 600;
        }

        .script-menu {
            position: relative;
        }

        .menu-trigger {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.2rem 0.5rem;
            border-radius: 5px;
            color: #999;
            transition: all 0.3s;
        }

        .menu-trigger:hover {
            background: #e0e0e0;
            color: #333;
        }

        .menu-dropdown {
            display: none;
            position: absolute;
            right: 0;
            top: 100%;
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            z-index: 10;
            min-width: 150px;
        }

        .menu-dropdown.active {
            display: block;
            animation: fadeIn 0.2s ease;
        }

        .menu-item {
            padding: 0.8rem 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s;
        }

        .menu-item:hover {
            background: #f0f0f0;
        }

        .menu-item:first-child { border-radius: 10px 10px 0 0; }
        .menu-item:last-child { border-radius: 0 0 10px 10px; }

        .menu-item.delete { color: #ff4757; }
        .menu-item.delete:hover { background: #ff4757; color: white; }

        .script-preview {
            font-family: 'Fira Code', monospace;
            font-size: 12px;
            color: #666;
            margin: 1rem 0;
            max-height: 100px;
            overflow: hidden;
            position: relative;
        }

        .script-preview::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 30px;
            background: linear-gradient(transparent, #f8f9fa);
        }

        .script-card-footer {
            display: flex;
            gap: 0.5rem;
        }

        .script-card-footer button {
            flex: 1;
            padding: 0.5rem;
            font-size: 0.9rem;
        }

        .sync-status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: white;
            padding: 0.5rem 1rem;
            border-radius: 50px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            z-index: 1000;
        }

        .sync-status span {
            color: #333;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 1rem 1.5rem;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            z-index: 1001;
            animation: slideInRight 0.3s ease;
            font-weight: 500;
            max-width: 300px;
            color: white;
        }

        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes slideOutRight {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }

        button:disabled { opacity: 0.6; cursor: not-allowed; }

        .key-highlight {
            background: #f0f0f0;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            word-break: break-all;
            font-family: 'Fira Code', monospace;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 1rem;
                padding: 1rem;
            }

            .welcome-section h1 {
                font-size: 2rem;
            }

            .script-info {
                flex-direction: column;
            }

            .editor-actions {
                flex-direction: column;
            }

            .container {
                padding: 0 1rem;
            }

            .modal-content {
                width: 95%;
                padding: 1.5rem;
            }

            .editor-container {
                height: 300px;
            }
            
            .btn {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="sync-status" id="syncStatus">
        <span id="syncText">San sang</span>
    </div>

    <nav class="navbar">
        <div class="logo">APEX HUB</div>
        <div class="nav-links">
            <div class="user-info" id="userInfo" style="display: none;">
                <div class="user-avatar" id="userAvatar">U</div>
                <span class="username" id="username"></span>
                <button class="btn btn-logout" onclick="logout()">Dang xuat</button>
            </div>
            <button class="btn btn-primary" onclick="openLoginModal()" id="loginBtn">Dang nhap</button>
        </div>
    </nav>

    <div class="container">
        <div class="welcome-section">
            <h1>APEX HUB - BAO VE</h1>
            <p>SU THOAI MAI KHI TAO SCRIPT</p>
        </div>

        <div class="editor-section" id="editorSection" style="display: none;">
            <div class="script-info">
                <input type="text" class="script-name-input" id="scriptName" placeholder="Dat ten cho script cua ban...">
                <input type="password" class="script-name-input" id="scriptPassword" placeholder="Dat mat khau cho script...">
            </div>
            
            <div class="editor-wrapper">
                <div class="editor-header">
                    <span>Code Editor</span>
                    <span class="word-count" id="wordCount">0 dong | 0 tu</span>
                </div>
                <div class="editor-container">
                    <div class="line-numbers" id="lineNumbers">
                        <div>1</div>
                    </div>
                    <textarea class="code-input" id="codeEditor" placeholder="Viet code cua ban o day..." oninput="updateEditor()" onscroll="syncScroll()" onkeydown="handleTab(event)" spellcheck="false"></textarea>
                </div>
            </div>

            <div class="editor-actions">
                <button class="btn btn-outline" id="createRawBtn" onclick="createOrUpdateRaw()">
                    Tao RAW
                </button>
                <button class="btn btn-outline" id="resetRawBtn" onclick="resetRaw()" style="display:none;">
                    RAW moi
                </button>
                <button class="btn btn-primary" onclick="downloadProtectedFile()">
                    Tai Raw (.lua)
                </button>
                <button class="btn btn-success" onclick="saveScript()">
                    Luu script
                </button>
                <button class="btn btn-primary" onclick="clearEditor()">
                    Them script moi
                </button>
            </div>
        </div>

        <div class="scripts-library">
            <div class="library-header">
                <h2>Thu vien script cua ban</h2>
                <input type="text" class="search-box" id="searchBox" placeholder="Tim kiem script..." oninput="filterScripts()">
            </div>
            <div class="scripts-grid" id="scriptsGrid">
            </div>
        </div>
    </div>

    <!-- Auth Modal -->
    <div class="modal" id="authModal">
        <div class="modal-content">
            <span class="close" onclick="closeAuthModal()">&times;</span>
            
            <div class="tabs">
                <button class="tab active" onclick="switchTab('login')" id="loginTab">Dang nhap</button>
                <button class="tab" onclick="switchTab('register')" id="registerTab">Dang ky</button>
            </div>

            <div class="tab-content active" id="loginForm">
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="loginEmail">Email</label>
                        <input type="email" id="loginEmail" placeholder="Nhap email cua ban" required>
                    </div>

                    <div class="form-group">
                        <label for="loginPassword">Mat khau</label>
                        <input type="password" id="loginPassword" placeholder="Nhap mat khau" required>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%;">Dang nhap</button>
                </form>
            </div>

            <div class="tab-content" id="registerForm">
                <form onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label for="registerName">Ten hien thi</label>
                        <input type="text" id="registerName" placeholder="Nhap ten cua ban" required>
                    </div>

                    <div class="form-group">
                        <label for="registerEmail">Email</label>
                        <input type="email" id="registerEmail" placeholder="Nhap email" required>
                    </div>

                    <div class="form-group">
                        <label for="registerPassword">Mat khau</label>
                        <input type="password" id="registerPassword" placeholder="Nhap mat khau" required>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Xac nhan mat khau</label>
                        <input type="password" id="confirmPassword" placeholder="Xac nhan mat khau" required>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%;">Dang ky</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Key Modal -->
    <div class="modal" id="keyModal">
        <div class="modal-content" style="text-align: center;">
            <span class="close" onclick="document.getElementById('keyModal').classList.remove('active')">&times;</span>
            <h3 style="margin-bottom: 10px; color: #333;">Access Key Cua Ban</h3>
            <p style="color: #888; font-size: 0.9rem; margin-bottom: 15px;">
                Canh bao: Key nay chi hien thi MOT LAN!<br>
                Hay luu lai de cap nhat/xoa script sau nay.
            </p>
            <div class="key-highlight" id="keyDisplay"></div>
            <button class="btn btn-primary" onclick="copyKeyFromModal()" style="width: 100%;">Copy Key</button>
            <button class="btn btn-outline" onclick="document.getElementById('keyModal').classList.remove('active')" style="width: 100%; margin-top: 10px;">Toi da luu key</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/12.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.9.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.9.0/firebase-analytics-compat.js"></script>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyD15lVtS0FSNhWroWKqF0e3ZjZ5q7KApTU",
            authDomain: "apex-hub-global-ffd6a.firebaseapp.com",
            projectId: "apex-hub-global-ffd6a",
            storageBucket: "apex-hub-global-ffd6a.firebasestorage.app",
            messagingSenderId: "627767111621",
            appId: "1:627767111621:web:e3c85c9c7ba49726e925ac",
            measurementId: "G-E9M7FC1R79"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        let currentUser = null;
        let currentEditingId = null;
        let currentRawId = null;
        let currentRawUrl = null;
        let currentAccessKey = null;
        const SYNC_KEY = 'APEX_HUB_SYNC';

        // ================== HELPER FUNCTIONS ==================
        function updateSyncStatus(text, isLoading = false) {
            const syncText = document.getElementById('syncText');
            if (isLoading) {
                syncText.innerHTML = '<span class="loading-spinner"></span>' + text;
            } else {
                syncText.textContent = text;
            }
        }

        function showNotification(message, type) {
            const existingNotif = document.querySelector('.notification');
            if (existingNotif) existingNotif.remove();

            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.style.background = type === 'success' ? '#00d25b' : type === 'error' ? '#ff4757' : type === 'warning' ? '#ffa502' : '#667eea';
            notification.textContent = message;
            document.body.appendChild(notification);
            setTimeout(() => {
                notification.style.animation = 'slideOutRight 0.3s ease';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ================== EDITOR FUNCTIONS ==================
        function updateEditor() {
            const editor = document.getElementById('codeEditor');
            const lineNumbers = document.getElementById('lineNumbers');
            const lines = editor.value.split('\n');
            const lineCount = lines.length;
            
            let lineNumbersHtml = '';
            for (let i = 1; i <= lineCount; i++) {
                lineNumbersHtml += '<div>' + i + '</div>';
            }
            lineNumbers.innerHTML = lineNumbersHtml;
            
            const words = editor.value.trim().split(/\s+/).filter(w => w.length > 0).length;
            document.getElementById('wordCount').textContent = lineCount + ' dong | ' + words + ' tu';
        }

        function syncScroll() {
            const editor = document.getElementById('codeEditor');
            const lineNumbers = document.getElementById('lineNumbers');
            lineNumbers.scrollTop = editor.scrollTop;
        }

        function handleTab(event) {
            if (event.key === 'Tab') {
                event.preventDefault();
                const editor = document.getElementById('codeEditor');
                const start = editor.selectionStart;
                const end = editor.selectionEnd;
                editor.value = editor.value.substring(0, start) + '    ' + editor.value.substring(end);
                editor.selectionStart = editor.selectionEnd = start + 4;
                updateEditor();
            }
        }

        function clearEditor() {
            document.getElementById('scriptName').value = '';
            document.getElementById('scriptPassword').value = '';
            document.getElementById('codeEditor').value = '';
            currentEditingId = null;
            document.querySelector('.btn-success').innerHTML = 'Luu script';
            updateEditor();
        }

        // ================== AUTH FUNCTIONS ==================
        function openLoginModal() {
            document.getElementById('authModal').classList.add('active');
            switchTab('login');
            resetForms();
        }

        function closeAuthModal() {
            document.getElementById('authModal').classList.remove('active');
            resetForms();
        }

        function resetForms() {
            document.getElementById('loginEmail').value = '';
            document.getElementById('loginPassword').value = '';
            document.getElementById('registerName').value = '';
            document.getElementById('registerEmail').value = '';
            document.getElementById('registerPassword').value = '';
            document.getElementById('confirmPassword').value = '';
        }

        function switchTab(tab) {
            const loginTab = document.getElementById('loginTab');
            const registerTab = document.getElementById('registerTab');
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');

            if (tab === 'login') {
                loginTab.classList.add('active');
                registerTab.classList.remove('active');
                loginForm.classList.add('active');
                registerForm.classList.remove('active');
            } else {
                registerTab.classList.add('active');
                loginTab.classList.remove('active');
                registerForm.classList.add('active');
                loginForm.classList.remove('active');
            }
        }

        function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                showNotification('Vui long nhap day du!', 'warning');
                return;
            }

            auth.signInWithEmailAndPassword(email, password)
                .then(userCredential => {
                    const user = userCredential.user;
                    currentUser = {
                        uid: user.uid,
                        name: user.displayName || user.email.split('@')[0],
                        email: user.email,
                        photoURL: user.photoURL
                    };
                    sessionStorage.setItem('currentUser', JSON.stringify(currentUser));
                    updateUI();
                    closeAuthModal();
                    loadScripts();
                    restoreRawState();
                    showNotification('Chao mung ' + currentUser.name + '!', 'success');
                })
                .catch(error => {
                    let msg = 'Dang nhap that bai!';
                    if (error.code === 'auth/user-not-found') msg = 'Tai khoan khong ton tai!';
                    if (error.code === 'auth/wrong-password') msg = 'Mat khau sai!';
                    if (error.code === 'auth/invalid-email') msg = 'Email khong hop le!';
                    showNotification(msg, 'error');
                });
        }

        function handleRegister(event) {
            event.preventDefault();
            const name = document.getElementById('registerName').value.trim();
            const email = document.getElementById('registerEmail').value.trim();
            const password = document.getElementById('registerPassword').value;
            const confirm = document.getElementById('confirmPassword').value;

            if (password !== confirm) {
                showNotification('Mat khau xac nhan khong khop!', 'error');
                return;
            }
            if (!name || !email || !password) {
                showNotification('Vui long nhap day du!', 'warning');
                return;
            }
            if (password.length < 6) {
                showNotification('Mat khau phai co it nhat 6 ky tu!', 'warning');
                return;
            }

            auth.createUserWithEmailAndPassword(email, password)
                .then(userCredential => {
                    return userCredential.user.updateProfile({ displayName: name }).then(() => userCredential);
                })
                .then(userCredential => {
                    currentUser = {
                        uid: userCredential.user.uid,
                        name: name,
                        email: email,
                        photoURL: null
                    };
                    sessionStorage.setItem('currentUser', JSON.stringify(currentUser));
                    updateUI();
                    closeAuthModal();
                    showNotification('Dang ky thanh cong! Chao ' + name, 'success');
                    loadScripts();
                })
                .catch(error => {
                    let msg = 'Dang ky that bai!';
                    if (error.code === 'auth/email-already-in-use') msg = 'Email da duoc su dung!';
                    if (error.code === 'auth/weak-password') msg = 'Mat khau qua yeu!';
                    showNotification(msg, 'error');
                });
        }

        function logout() {
            auth.signOut().then(() => {
                currentUser = null;
                sessionStorage.removeItem('currentUser');
                updateUI();
                loadScripts();
                resetForms();
                closeAuthModal();
                showNotification('Da dang xuat!', 'info');
            }).catch(error => {
                showNotification('Loi khi dang xuat!', 'error');
            });
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = {
                    uid: user.uid,
                    name: user.displayName || user.email.split('@')[0],
                    email: user.email,
                    photoURL: user.photoURL
                };
                sessionStorage.setItem('currentUser', JSON.stringify(currentUser));
                updateUI();
                loadScripts();
                restoreRawState();
            } else {
                currentUser = null;
                sessionStorage.removeItem('currentUser');
                updateUI();
            }
        });

        function updateUI() {
            const userInfo = document.getElementById('userInfo');
            const loginBtn = document.getElementById('loginBtn');
            const username = document.getElementById('username');
            const userAvatar = document.getElementById('userAvatar');
            const editorSection = document.getElementById('editorSection');

            if (currentUser) {
                userInfo.style.display = 'flex';
                loginBtn.style.display = 'none';
                username.textContent = currentUser.name;
                if (currentUser.photoURL) {
                    userAvatar.innerHTML = '<img src="' + currentUser.photoURL + '" alt="Avatar">';
                } else {
                    userAvatar.textContent = currentUser.name.charAt(0).toUpperCase();
                }
                editorSection.style.display = 'block';
            } else {
                userInfo.style.display = 'none';
                loginBtn.style.display = 'block';
                editorSection.style.display = 'none';
            }
        }

        // ================== SCRIPT MANAGEMENT ==================
        function saveScript() {
            if (!currentUser) {
                showNotification('Vui long dang nhap de luu script!', 'warning');
                return;
            }

            const name = document.getElementById('scriptName').value.trim();
            const password = document.getElementById('scriptPassword').value.trim();
            const content = document.getElementById('codeEditor').value;

            if (!name || !password || !content) {
                showNotification('Vui long nhap day du!', 'warning');
                return;
            }

            const userScriptsKey = 'scripts_' + currentUser.uid;
            const userScripts = JSON.parse(localStorage.getItem(userScriptsKey) || '[]');

            if (currentEditingId) {
                const scriptIndex = userScripts.findIndex(s => s.id === currentEditingId);
                if (scriptIndex !== -1) {
                    userScripts[scriptIndex].name = name;
                    userScripts[scriptIndex].password = password;
                    userScripts[scriptIndex].content = content;
                    userScripts[scriptIndex].updatedAt = new Date().toISOString();
                }
            } else {
                const newScript = {
                    id: Date.now() + Math.random().toString(36),
                    name: name,
                    password: password,
                    content: content,
                    createdAt: new Date().toISOString()
                };
                userScripts.push(newScript);
            }

            localStorage.setItem(userScriptsKey, JSON.stringify(userScripts));
            localStorage.setItem(SYNC_KEY, Date.now().toString());
            
            loadScripts();
            clearEditor();
            currentEditingId = null;
            document.querySelector('.btn-success').innerHTML = 'Luu script';
            showNotification('Luu script thanh cong!', 'success');
            updateSyncStatus('Da dong bo');
        }

        function loadScripts(filterText = '') {
            if (!currentUser) {
                document.getElementById('scriptsGrid').innerHTML = '<p style="text-align: center; color: #999; grid-column: 1/-1;">Vui long dang nhap de xem script cua ban</p>';
                return;
            }

            const userScriptsKey = 'scripts_' + currentUser.uid;
            let userScripts = JSON.parse(localStorage.getItem(userScriptsKey) || '[]');
            
            if (filterText) {
                userScripts = userScripts.filter(script => 
                    script.name.toLowerCase().includes(filterText.toLowerCase())
                );
            }

            if (userScripts.length === 0) {
                document.getElementById('scriptsGrid').innerHTML = '<p style="text-align: center; color: #999; grid-column: 1/-1;">' + (filterText ? 'Khong tim thay script nao.' : 'Ban chua co script nao. Hay tao script dau tien!') + '</p>';
                return;
            }

            const grid = document.getElementById('scriptsGrid');
            grid.innerHTML = userScripts.map(script => 
                '<div class="script-card">' +
                    '<div class="script-card-header">' +
                        '<h3>' + escapeHtml(script.name) + '</h3>' +
                        '<div class="script-menu">' +
                            '<button class="menu-trigger" onclick="toggleMenu(\'' + script.id + '\')">&#8942;</button>' +
                            '<div class="menu-dropdown" id="menu-' + script.id + '">' +
                                '<div class="menu-item" onclick="renameScript(\'' + script.id + '\')">Doi ten</div>' +
                                '<div class="menu-item delete" onclick="deleteScript(\'' + script.id + '\')">Xoa</div>' +
                            '</div>' +
                        '</div>' +
                    '</div>' +
                    '<div class="script-preview">' +
                        '<code>' + escapeHtml(script.content.substring(0, 100)) + (script.content.length > 100 ? '...' : '') + '</code>' +
                    '</div>' +
                    '<div class="script-card-footer">' +
                        '<button class="btn btn-outline" onclick="editScript(\'' + script.id + '\')">Sua</button>' +
                        '<button class="btn btn-primary" onclick="copyScriptContent(\'' + script.id + '\')">Copy</button>' +
                    '</div>' +
                '</div>'
            ).join('');
        }

        function filterScripts() {
            const searchText = document.getElementById('searchBox').value;
            loadScripts(searchText);
        }

        function toggleMenu(scriptId) {
            const menu = document.getElementById('menu-' + scriptId);
            menu.classList.toggle('active');
            document.querySelectorAll('.menu-dropdown').forEach(m => {
                if (m.id !== 'menu-' + scriptId) m.classList.remove('active');
            });
        }

        function editScript(scriptId) {
            const userScriptsKey = 'scripts_' + currentUser.uid;
            const userScripts = JSON.parse(localStorage.getItem(userScriptsKey) || '[]');
            const script = userScripts.find(s => s.id === scriptId);
            
            if (script) {
                document.getElementById('scriptName').value = script.name;
                document.getElementById('scriptPassword').value = script.password;
                document.getElementById('codeEditor').value = script.content;
                updateEditor();
                currentEditingId = scriptId;
                document.querySelector('.btn-success').innerHTML = 'Cap nhat script';
            }
            
            document.querySelectorAll('.menu-dropdown').forEach(m => m.classList.remove('active'));
        }

        function renameScript(scriptId) {
            const newName = prompt('Nhap ten moi cho script:');
            if (newName && newName.trim()) {
                const userScriptsKey = 'scripts_' + currentUser.uid;
                const userScripts = JSON.parse(localStorage.getItem(userScriptsKey) || '[]');
                const scriptIndex = userScripts.findIndex(s => s.id === scriptId);
                if (scriptIndex !== -1) {
                    userScripts[scriptIndex].name = newName.trim();
                    localStorage.setItem(userScriptsKey, JSON.stringify(userScripts));
                    localStorage.setItem(SYNC_KEY, Date.now().toString());
                    loadScripts();
                    showNotification('Da doi ten script!', 'success');
                    updateSyncStatus('Da dong bo');
                }
            }
            document.querySelectorAll('.menu-dropdown').forEach(m => m.classList.remove('active'));
        }

        function deleteScript(scriptId, showNotif = true) {
            if (confirm('Ban co chac muon xoa script nay?')) {
                const userScriptsKey = 'scripts_' + currentUser.uid;
                const userScripts = JSON.parse(localStorage.getItem(userScriptsKey) || '[]');
                const updatedScripts = userScripts.filter(s => s.id !== scriptId);
                localStorage.setItem(userScriptsKey, JSON.stringify(updatedScripts));
                localStorage.setItem(SYNC_KEY, Date.now().toString());
                
                if (currentEditingId === scriptId) clearEditor();
                
                loadScripts();
                if (showNotif) {
                    showNotification('Da xoa script!', 'info');
                    updateSyncStatus('Da dong bo');
                }
            }
            document.querySelectorAll('.menu-dropdown').forEach(m => m.classList.remove('active'));
        }

        function copyScriptContent(scriptId) {
            const userScriptsKey = 'scripts_' + currentUser.uid;
            const userScripts = JSON.parse(localStorage.getItem(userScriptsKey) || '[]');
            const script = userScripts.find(s => s.id === scriptId);
            if (script) {
                navigator.clipboard.writeText(script.content).then(() => {
                    showNotification('Da copy script vao clipboard!', 'success');
                });
            }
        }

        // ================== VERCEL RAW API FUNCTIONS (GOP NUT) ==================
        async function createOrUpdateRaw() {
            const content = document.getElementById('codeEditor').value;
            const scriptName = document.getElementById('scriptName').value.trim();

            if (!content.trim()) {
                showNotification('Vui long nhap code!', 'warning');
                return;
            }

            if (!scriptName) {
                showNotification('Vui long dat ten cho script!', 'warning');
                return;
            }

            const rawBtn = document.getElementById('createRawBtn');
            const isUpdating = rawBtn.innerHTML.includes('Cap nhat');
            
            rawBtn.innerHTML = '<span class="loading-spinner"></span>' + (isUpdating ? 'Dang cap nhat...' : 'Dang tao...');
            rawBtn.disabled = true;
            updateSyncStatus(isUpdating ? 'Dang cap nhat RAW...' : 'Dang tao RAW...', true);

            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 15000);

                let response;
                
                if (isUpdating && currentRawId && currentAccessKey) {
                    response = await fetch('/api/raw', {
                        method: 'PUT',
                        headers: { 
                            'Content-Type': 'application/json',
                            'Accept': 'application/json'
                        },
                        body: JSON.stringify({ 
                            name: currentRawId, 
                            code: content,
                            accessKey: currentAccessKey
                        }),
                        signal: controller.signal
                    });
                } else {
                    response = await fetch('/api/raw', {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json',
                            'Accept': 'application/json'
                        },
                        body: JSON.stringify({ code: content, name: scriptName }),
                        signal: controller.signal
                    });
                }

                clearTimeout(timeoutId);

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error || 'HTTP ' + response.status);
                }

                const data = await response.json();

                if (data.success) {
                    currentRawId = data.name;
                    currentRawUrl = data.raw;
                    
                    if (data.accessKey) {
                        currentAccessKey = data.accessKey;
                        showKeyModal(data.accessKey);
                    }
                    
                    if (currentUser) {
                        localStorage.setItem('currentRaw_' + currentUser.uid, JSON.stringify({
                            name: currentRawId,
                            url: currentRawUrl,
                            accessKey: currentAccessKey,
                            code: content,
                            timestamp: Date.now()
                        }));
                    }

                    rawBtn.innerHTML = 'Cap nhat RAW';
                    document.getElementById('resetRawBtn').style.display = 'inline-flex';
                    
                    await navigator.clipboard.writeText(data.raw);
                    showNotification((isUpdating ? 'Da cap nhat' : 'Da tao') + ' RAW! URL da duoc copy.', 'success');
                    updateSyncStatus('RAW san sang');
                    
                    setTimeout(() => window.open(data.raw, '_blank'), 500);
                } else {
                    throw new Error('That bai');
                }
            } catch (err) {
                console.error('Loi RAW:', err);
                let errorMsg = 'Loi! ';
                if (err.name === 'AbortError') errorMsg += 'Timeout.';
                else if (err.message.includes('Failed to fetch')) errorMsg += 'Khong ket noi duoc server.';
                else errorMsg += err.message;
                showNotification(errorMsg, 'error');
                updateSyncStatus('That bai');
            } finally {
                rawBtn.disabled = false;
                setTimeout(() => {
                    if (document.getElementById('syncText').innerHTML.includes('Dang')) {
                        updateSyncStatus('San sang');
                    }
                }, 2000);
            }
        }

        function showKeyModal(key) {
            document.getElementById('keyDisplay').textContent = key;
            document.getElementById('keyModal').classList.add('active');
        }

        function copyKeyFromModal() {
            const key = document.getElementById('keyDisplay').textContent;
            navigator.clipboard.writeText(key).then(() => {
                showNotification('Key da duoc copy!', 'success');
            });
        }

        function resetRaw() {
            if (confirm('Ban co chac muon tao RAW moi? RAW cu se khong the cap nhat neu khong co key.')) {
                currentRawId = null;
                currentRawUrl = null;
                currentAccessKey = null;
                if (currentUser) {
                    localStorage.removeItem('currentRaw_' + currentUser.uid);
                }
                
                const createBtn = document.getElementById('createRawBtn');
                createBtn.innerHTML = 'Tao RAW';
                
                document.getElementById('resetRawBtn').style.display = 'none';
                showNotification('Da reset! Co the tao RAW moi.', 'info');
            }
        }

        function restoreRawState() {
            if (currentUser) {
                const savedRaw = localStorage.getItem('currentRaw_' + currentUser.uid);
                if (savedRaw) {
                    try {
                        const rawData = JSON.parse(savedRaw);
                        if (Date.now() - rawData.timestamp < 7 * 24 * 60 * 60 * 1000) {
                            currentRawId = rawData.name;
                            currentRawUrl = rawData.url;
                            currentAccessKey = rawData.accessKey;
                            
                            const createBtn = document.getElementById('createRawBtn');
                            createBtn.innerHTML = 'Cap nhat RAW';
                            
                            document.getElementById('resetRawBtn').style.display = 'inline-flex';
                        }
                    } catch(e) {
                        console.error('Error restoring RAW state:', e);
                    }
                }
            }
        }

        function downloadProtectedFile() {
            const content = document.getElementById('codeEditor').value;
            const fileName = (document.getElementById('scriptName').value.trim() || 'script') + '.lua';

            if (!content.trim()) {
                showNotification('Chua co code de tai!', 'warning');
                return;
            }

            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            setTimeout(() => {
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            }, 100);
            showNotification('Dang tai file ve may!', 'success');
        }

        // ================== INIT ==================
        window.onclick = function(event) {
            const authModal = document.getElementById('authModal');
            const keyModal = document.getElementById('keyModal');
            if (event.target === authModal) closeAuthModal();
            if (event.target === keyModal) keyModal.classList.remove('active');
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadScripts();
            updateEditor();
            resetForms();
            updateSyncStatus('San sang');
            if (currentUser) restoreRawState();
        });
    </script>
