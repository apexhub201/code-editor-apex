<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>APEX HUB - Code Script Editor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #151530 100%);
            min-height: 100vh;
            color: #e0e0ff;
        }
        .navbar {
            background: rgba(15, 15, 35, 0.95);
            backdrop-filter: blur(20px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(102, 126, 234, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2, #ff6b81);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 4s ease-in-out infinite;
        }
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .nav-links { display: flex; gap: 1rem; align-items: center; }
        .user-info {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            background: rgba(102, 126, 234, 0.15);
            padding: 0.5rem 1rem;
            border-radius: 50px;
            border: 1px solid rgba(102, 126, 234, 0.3);
        }
        .username { font-weight: 600; color: #667eea; font-size: 0.9rem; }
        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .user-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .btn {
            padding: 0.55rem 1.2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.85rem;
            font-family: 'Inter', sans-serif;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5); }
        .btn-outline {
            background: transparent;
            border: 2px solid #667eea;
            color: #667eea;
        }
        .btn-outline:hover { background: #667eea; color: white; }
        .btn-success { background: #00d25b; color: white; }
        .btn-success:hover { background: #00b894; transform: translateY(-2px); }
        .btn-danger { background: #ff4757; color: white; }
        .btn-danger:hover { background: #ff3838; }
        .btn-raw {
            background: linear-gradient(135deg, #ffa502, #ff6348);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 165, 2, 0.3);
            font-weight: 700;
        }
        .btn-raw:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(255, 165, 2, 0.5); }
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #151530;
            padding: 2rem;
            border-radius: 20px;
            width: 90%;
            max-width: 450px;
            border: 1px solid rgba(102, 126, 234, 0.2);
            animation: slideIn 0.3s ease;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            max-height: 90vh;
            overflow-y: auto;
        }
        @keyframes slideIn {
            from { transform: translateY(-40px) scale(0.95); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }
        .close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            font-size: 1.3rem;
            cursor: pointer;
            color: #888;
            transition: color 0.3s;
            background: none;
            border: none;
        }
        .close:hover { color: #fff; }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label {
            display: block;
            margin-bottom: 0.4rem;
            color: #aab;
            font-weight: 500;
            font-size: 0.9rem;
        }
        .form-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(15,15,40,0.8);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            font-size: 0.95rem;
            color: #fff;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 15px rgba(102, 126, 234, 0.15);
        }
        .tabs {
            display: flex;
            gap: 0.4rem;
            margin-bottom: 1.5rem;
            background: rgba(15,15,40,0.6);
            padding: 0.4rem;
            border-radius: 50px;
        }
        .tab {
            flex: 1;
            padding: 0.6rem;
            border: none;
            background: transparent;
            cursor: pointer;
            font-weight: 600;
            border-radius: 50px;
            transition: all 0.3s;
            color: #888;
            font-family: 'Inter', sans-serif;
        }
        .tab.active { background: #667eea; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .container { max-width: 1400px; margin: 2rem auto; padding: 0 2rem; }
        .welcome-section {
            text-align: center;
            margin-bottom: 2rem;
            padding: 2.5rem;
            background: rgba(102, 126, 234, 0.08);
            border: 1px solid rgba(102, 126, 234, 0.15);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
        .welcome-section h1 { font-size: 2.8rem; font-weight: 800; margin-bottom: 0.5rem; }
        .welcome-section p { color: #888; font-size: 1.1rem; }
        .editor-section {
            background: rgba(15, 15, 40, 0.7);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(102, 126, 234, 0.15);
            backdrop-filter: blur(10px);
        }
        .script-info { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .script-name-input {
            flex: 1;
            min-width: 200px;
            padding: 0.9rem 1.2rem;
            background: rgba(15,15,40,0.8);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 500;
            color: #fff;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }
        .script-name-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 15px rgba(102, 126, 234, 0.15);
        }
        .script-name-input::placeholder { color: #555; }
        .editor-wrapper {
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 1.5rem;
            background: #1a1a2e;
        }
        .editor-header {
            background: #222240;
            padding: 0.7rem 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .editor-header span { font-weight: 600; color: #667eea; font-size: 0.9rem; }
        .word-count { color: #888 !important; font-weight: 400 !important; font-size: 0.8rem !important; }
        .editor-container { display: flex; height: 400px; overflow: hidden; font-family: 'Fira Code', monospace; font-size: 14px; line-height: 1.6; background: #1a1a2e; }
        .line-numbers {
            padding: 1rem 0.5rem;
            text-align: right;
            background: #222240;
            color: #555;
            user-select: none;
            border-right: 1px solid rgba(255,255,255,0.05);
            min-width: 50px;
            overflow: hidden;
        }
        .line-numbers div { padding: 0 0.5rem; }
        .code-input {
            flex: 1;
            padding: 1rem;
            border: none;
            background: #1a1a2e;
            color: #f8f8f2;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            white-space: pre;
            overflow: auto;
        }
        .code-input:focus { outline: none; }
        .editor-actions { display: flex; gap: 0.8rem; justify-content: flex-end; flex-wrap: wrap; }
        .scripts-library {
            background: rgba(15, 15, 40, 0.7);
            border-radius: 20px;
            padding: 2rem;
            border: 1px solid rgba(102, 126, 234, 0.15);
            backdrop-filter: blur(10px);
        }
        .library-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .library-header h2 { font-size: 1.5rem; }
        .search-box {
            padding: 0.7rem 1.2rem;
            background: rgba(15,15,40,0.8);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            font-size: 0.9rem;
            width: 280px;
            color: #fff;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }
        .search-box:focus { outline: none; border-color: #667eea; }
        .search-box::placeholder { color: #555; }
        .scripts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.2rem; }
        .script-card {
            background: rgba(20, 20, 50, 0.7);
            border-radius: 14px;
            padding: 1.3rem;
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
        }
        .script-card:hover {
            transform: translateY(-4px);
            border-color: rgba(102, 126, 234, 0.4);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.15);
        }
        .script-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.8rem; }
        .script-card-header h3 { font-size: 1.1rem; font-weight: 600; }
        .script-menu { position: relative; }
        .menu-trigger {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0.2rem 0.5rem;
            border-radius: 6px;
            color: #888;
            transition: all 0.3s;
        }
        .menu-trigger:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .menu-dropdown {
            display: none;
            position: absolute;
            right: 0;
            top: 100%;
            background: #1a1a35;
            border-radius: 10px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            z-index: 10;
            min-width: 140px;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
        }
        .menu-dropdown.active { display: block; animation: fadeIn 0.2s ease; }
        .menu-item {
            padding: 0.7rem 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            transition: all 0.2s;
            color: #aab;
        }
        .menu-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .menu-item.delete { color: #ff4757; }
        .menu-item.delete:hover { background: rgba(255,71,87,0.15); color: #ff6b81; }
        .script-preview {
            font-family: 'Fira Code', monospace;
            font-size: 11px;
            color: #666;
            margin: 0.8rem 0;
            max-height: 90px;
            overflow: hidden;
            position: relative;
            line-height: 1.4;
        }
        .script-preview::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 30px;
            background: linear-gradient(transparent, rgba(20, 20, 50, 0.9));
        }
        .script-card-footer { display: flex; gap: 0.4rem; }
        .script-card-footer button { flex: 1; padding: 0.45rem; font-size: 0.8rem; }
        .sync-status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(15,15,40,0.9);
            padding: 0.5rem 1rem;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }
        .sync-status i { color: #667eea; }
        .loading-spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.2);
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            color: white;
            z-index: 1001;
            animation: slideInRight 0.3s ease;
            font-weight: 500;
            font-size: 0.9rem;
            max-width: 350px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        @keyframes slideInRight {
            from { transform: translateX(120%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes slideOutRight {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(120%); opacity: 0; }
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        @media (max-width: 768px) {
            .navbar { flex-direction: column; gap: 0.8rem; padding: 1rem; }
            .welcome-section h1 { font-size: 2rem; }
            .script-info { flex-direction: column; }
            .editor-actions { flex-direction: column; }
            .container { padding: 0 1rem; }
            .modal-content { width: 95%; padding: 1.5rem; }
            .editor-container { height: 300px; }
            .btn { justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="sync-status" id="syncStatus">
        <i class="fas fa-sync-alt"></i>
        <span id="syncText">Sẵn sàng</span>
    </div>

    <nav class="navbar">
        <div class="logo">APEX HUB</div>
        <div class="nav-links">
            <div class="user-info" id="userInfo" style="display: none;">
                <div class="user-avatar" id="userAvatar">U</div>
                <span class="username" id="username"></span>
                <button class="btn btn-danger" onclick="logout()" style="padding:0.4rem 1rem;font-size:0.8rem;">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
            <button class="btn btn-primary" onclick="openLoginModal()" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> Đăng nhập
            </button>
        </div>
    </nav>

    <div class="container">
        <div class="welcome-section">
            <h1>⚡ APEX HUB</h1>
            <p>Trình soạn thảo & bảo vệ Script Lua</p>
        </div>

        <div class="editor-section" id="editorSection" style="display: none;">
            <div class="script-info">
                <input type="text" class="script-name-input" id="scriptName" placeholder="📝 Tên script...">
                <input type="password" class="script-name-input" id="scriptKey" placeholder="🔑 Key bảo vệ...">
            </div>
            
            <div class="editor-wrapper">
                <div class="editor-header">
                    <span><i class="fas fa-code"></i> Lua Editor</span>
                    <span class="word-count" id="wordCount">0 dòng | 0 từ</span>
                </div>
                <div class="editor-container">
                    <div class="line-numbers" id="lineNumbers"><div>1</div></div>
                    <textarea class="code-input" id="codeEditor" placeholder="-- Viết code Lua ở đây..." oninput="updateEditor()" onscroll="syncScroll()" onkeydown="handleTab(event)" spellcheck="false"></textarea>
                </div>
            </div>

            <div class="editor-actions">
                <!-- NÚT GỘP: Tạo RAW / Cập nhật RAW -->
                <button class="btn btn-raw" id="rawActionBtn" onclick="handleRawAction()">
                    <i class="fas fa-shield-alt"></i> <span id="rawActionText">Tạo RAW</span>
                </button>
                <button class="btn btn-outline" id="resetRawBtn" onclick="resetRaw()" style="display:none;">
                    <i class="fas fa-plus"></i> Mới
                </button>
                <button class="btn btn-primary" onclick="downloadScript()">
                    <i class="fas fa-download"></i> Tải .lua
                </button>
                <button class="btn btn-success" onclick="saveScript()">
                    <i class="fas fa-save"></i> Lưu
                </button>
                <button class="btn btn-outline" onclick="clearEditor()">
                    <i class="fas fa-plus"></i> Script mới
                </button>
            </div>
            
            <!-- Hiển thị link RAW đã tạo -->
            <div id="rawLinkDisplay" style="margin-top:1rem;display:none;">
                <div style="background:rgba(0,210,91,0.1);border:1px solid rgba(0,210,91,0.3);border-radius:10px;padding:0.8rem 1rem;word-break:break-all;">
                    <small style="color:#00d25b;font-weight:600;">🔗 RAW Link:</small><br>
                    <code id="rawLinkText" style="color:#aab;font-size:0.8rem;"></code>
                    <button class="btn btn-outline" onclick="copyRawLink()" style="margin-top:0.5rem;padding:0.3rem 0.8rem;font-size:0.75rem;">
                        <i class="fas fa-copy"></i> Copy
                    </button>
                </div>
            </div>
        </div>

        <div class="scripts-library">
            <div class="library-header">
                <h2><i class="fas fa-folder-open"></i> Thư viện Script</h2>
                <input type="text" class="search-box" id="searchBox" placeholder="🔍 Tìm kiếm..." oninput="filterScripts()">
            </div>
            <div class="scripts-grid" id="scriptsGrid"></div>
        </div>
    </div>

    <!-- Auth Modal -->
    <div class="modal" id="authModal">
        <div class="modal-content" style="position:relative;">
            <button class="close" onclick="closeAuthModal()">&times;</button>
            <div class="tabs">
                <button class="tab active" onclick="switchTab('login')" id="loginTab">Đăng nhập</button>
                <button class="tab" onclick="switchTab('register')" id="registerTab">Đăng ký</button>
            </div>
            <div class="tab-content active" id="loginForm">
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="loginEmail" placeholder="Nhập email..." required>
                    </div>
                    <div class="form-group">
                        <label>Mật khẩu</label>
                        <input type="password" id="loginPassword" placeholder="Nhập mật khẩu..." required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width:100%;">Đăng nhập</button>
                </form>
            </div>
            <div class="tab-content" id="registerForm">
                <form onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label>Tên hiển thị</label>
                        <input type="text" id="registerName" placeholder="Nhập tên..." required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="registerEmail" placeholder="Nhập email..." required>
                    </div>
                    <div class="form-group">
                        <label>Mật khẩu</label>
                        <input type="password" id="registerPassword" placeholder="Ít nhất 6 ký tự..." required>
                    </div>
                    <div class="form-group">
                        <label>Xác nhận mật khẩu</label>
                        <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu..." required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width:100%;">Đăng ký</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/12.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.9.0/firebase-auth-compat.js"></script>

    <script>
        // ==================== FIREBASE ====================
        const firebaseConfig = {
            apiKey: "AIzaSyD15lVtS0FSNhWroWKqF0e3ZjZ5q7KApTU",
            authDomain: "apex-hub-global-ffd6a.firebaseapp.com",
            projectId: "apex-hub-global-ffd6a",
            storageBucket: "apex-hub-global-ffd6a.firebasestorage.app",
            messagingSenderId: "627767111621",
            appId: "1:627767111621:web:e3c85c9c7ba49726e925ac",
            measurementId: "G-E9M7FC1R79"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // ==================== STATE ====================
        let currentUser = null;
        let currentEditingId = null;
        let currentRawData = null; // { name, storageId, url, code, key }
        const SYNC_KEY = 'APEX_HUB_SYNC_V2';

        // ==================== HELPERS ====================
        function updateSyncStatus(text, loading = false) {
            const el = document.getElementById('syncText');
            el.innerHTML = loading ? '<span class="loading-spinner"></span>' + text : text;
        }

        function showNotification(msg, type = 'info') {
            const existing = document.querySelector('.notification');
            if (existing) existing.remove();
            const colors = { success: '#00d25b', error: '#ff4757', warning: '#ffa502', info: '#667eea' };
            const n = document.createElement('div');
            n.className = 'notification';
            n.style.background = colors[type] || colors.info;
            n.textContent = msg;
            document.body.appendChild(n);
            setTimeout(() => {
                n.style.animation = 'slideOutRight 0.3s ease forwards';
                setTimeout(() => n.remove(), 300);
            }, 3000);
        }

        function escapeHtml(text) {
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }

        // ==================== EDITOR ====================
        function updateEditor() {
            const editor = document.getElementById('codeEditor');
            const lineNumbers = document.getElementById('lineNumbers');
            const lines = editor.value.split('\n');
            let html = '';
            for (let i = 1; i <= lines.length; i++) html += `<div>${i}</div>`;
            lineNumbers.innerHTML = html;
            const words = editor.value.trim().split(/\s+/).filter(w => w.length > 0).length;
            document.getElementById('wordCount').textContent = `${lines.length} dòng | ${words} từ`;
        }

        function syncScroll() {
            document.getElementById('lineNumbers').scrollTop = document.getElementById('codeEditor').scrollTop;
        }

        function handleTab(e) {
            if (e.key === 'Tab') {
                e.preventDefault();
                const editor = document.getElementById('codeEditor');
                const s = editor.selectionStart;
                editor.value = editor.value.substring(0, s) + '    ' + editor.value.substring(editor.selectionEnd);
                editor.selectionStart = editor.selectionEnd = s + 4;
                updateEditor();
            }
        }

        function clearEditor() {
            document.getElementById('scriptName').value = '';
            document.getElementById('scriptKey').value = '';
            document.getElementById('codeEditor').value = '';
            currentEditingId = null;
            document.querySelector('.btn-success').innerHTML = '<i class="fas fa-save"></i> Lưu';
            updateEditor();
        }

        // ==================== AUTH ====================
        function openLoginModal() { document.getElementById('authModal').classList.add('active'); switchTab('login'); }
        function closeAuthModal() { document.getElementById('authModal').classList.remove('active'); }

        function switchTab(tab) {
            const tabs = document.querySelectorAll('.tab');
            const contents = document.querySelectorAll('.tab-content');
            tabs.forEach(t => t.classList.remove('active'));
            contents.forEach(c => c.classList.remove('active'));
            if (tab === 'login') {
                document.getElementById('loginTab').classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.getElementById('registerTab').classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
        }

        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPassword').value;
            auth.signInWithEmailAndPassword(email, pass)
                .then(uc => {
                    currentUser = { uid: uc.user.uid, name: uc.user.displayName || email.split('@')[0], email: uc.user.email, photoURL: uc.user.photoURL };
                    sessionStorage.setItem('apex_user', JSON.stringify(currentUser));
                    updateUI();
                    closeAuthModal();
                    loadScripts();
                    restoreRawState();
                    showNotification('Chào ' + currentUser.name + '!', 'success');
                })
                .catch(err => {
                    let msg = 'Lỗi đăng nhập!';
                    if (err.code === 'auth/user-not-found') msg = 'Tài khoản không tồn tại!';
                    if (err.code === 'auth/wrong-password') msg = 'Sai mật khẩu!';
                    showNotification(msg, 'error');
                });
        }

        function handleRegister(e) {
            e.preventDefault();
            const name = document.getElementById('registerName').value.trim();
            const email = document.getElementById('registerEmail').value.trim();
            const pass = document.getElementById('registerPassword').value;
            const confirm = document.getElementById('confirmPassword').value;
            if (pass !== confirm) return showNotification('Mật khẩu không khớp!', 'warning');
            if (pass.length < 6) return showNotification('Mật khẩu tối thiểu 6 ký tự!', 'warning');
            auth.createUserWithEmailAndPassword(email, pass)
                .then(uc => uc.user.updateProfile({ displayName: name }).then(() => uc))
                .then(uc => {
                    currentUser = { uid: uc.user.uid, name, email, photoURL: null };
                    sessionStorage.setItem('apex_user', JSON.stringify(currentUser));
                    updateUI();
                    closeAuthModal();
                    loadScripts();
                    showNotification('Đăng ký thành công!', 'success');
                })
                .catch(err => {
                    let msg = 'Lỗi đăng ký!';
                    if (err.code === 'auth/email-already-in-use') msg = 'Email đã được sử dụng!';
                    showNotification(msg, 'error');
                });
        }

        function logout() {
            auth.signOut();
            currentUser = null;
            sessionStorage.removeItem('apex_user');
            updateUI();
            loadScripts();
            showNotification('Đã đăng xuất', 'info');
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = { uid: user.uid, name: user.displayName || user.email.split('@')[0], email: user.email, photoURL: user.photoURL };
                sessionStorage.setItem('apex_user', JSON.stringify(currentUser));
                updateUI();
                loadScripts();
                restoreRawState();
            } else {
                const saved = sessionStorage.getItem('apex_user');
                if (saved) currentUser = JSON.parse(saved);
                updateUI();
                if (!currentUser) loadScripts();
            }
        });

        function updateUI() {
            const userInfo = document.getElementById('userInfo');
            const loginBtn = document.getElementById('loginBtn');
            const editorSection = document.getElementById('editorSection');
            if (currentUser) {
                userInfo.style.display = 'flex';
                loginBtn.style.display = 'none';
                document.getElementById('username').textContent = currentUser.name;
                document.getElementById('userAvatar').textContent = currentUser.name.charAt(0).toUpperCase();
                editorSection.style.display = 'block';
            } else {
                userInfo.style.display = 'none';
                loginBtn.style.display = 'flex';
                editorSection.style.display = 'none';
            }
        }

        // ==================== SCRIPT MANAGEMENT ====================
        function saveScript() {
            if (!currentUser) return showNotification('Vui lòng đăng nhập!', 'warning');
            const name = document.getElementById('scriptName').value.trim();
            const key = document.getElementById('scriptKey').value.trim();
            const content = document.getElementById('codeEditor').value;
            if (!name || !key || !content) return showNotification('Nhập đầy đủ Tên, Key và Code!', 'warning');

            const storageKey = `scripts_${currentUser.uid}`;
            let scripts = JSON.parse(localStorage.getItem(storageKey) || '[]');

            if (currentEditingId) {
                const idx = scripts.findIndex(s => s.id === currentEditingId);
                if (idx !== -1) {
                    scripts[idx].name = name;
                    scripts[idx].key = key;
                    scripts[idx].content = content;
                    scripts[idx].updatedAt = Date.now();
                }
            } else {
                scripts.push({
                    id: Date.now().toString(36) + Math.random().toString(36).substring(2),
                    name, key, content,
                    createdAt: Date.now()
                });
            }
            localStorage.setItem(storageKey, JSON.stringify(scripts));
            localStorage.setItem(SYNC_KEY, Date.now().toString());
            loadScripts();
            clearEditor();
            showNotification('Đã lưu script!', 'success');
            updateSyncStatus('Đã đồng bộ');
        }

        function loadScripts(filter = '') {
            const grid = document.getElementById('scriptsGrid');
            if (!currentUser) {
                grid.innerHTML = '<p style="text-align:center;color:#666;grid-column:1/-1;">Vui lòng đăng nhập</p>';
                return;
            }
            const storageKey = `scripts_${currentUser.uid}`;
            let scripts = JSON.parse(localStorage.getItem(storageKey) || '[]');
            if (filter) scripts = scripts.filter(s => s.name.toLowerCase().includes(filter.toLowerCase()));
            if (scripts.length === 0) {
                grid.innerHTML = `<p style="text-align:center;color:#666;grid-column:1/-1;">${filter ? 'Không tìm thấy' : 'Chưa có script nào'}</p>`;
                return;
            }
            grid.innerHTML = scripts.map(s => `
                <div class="script-card">
                    <div class="script-card-header">
                        <h3>${escapeHtml(s.name)}</h3>
                        <div class="script-menu">
                            <button class="menu-trigger" onclick="toggleMenu('${s.id}')"><i class="fas fa-ellipsis-v"></i></button>
                            <div class="menu-dropdown" id="menu-${s.id}">
                                <div class="menu-item" onclick="editScript('${s.id}')"><i class="fas fa-edit"></i> Sửa</div>
                                <div class="menu-item delete" onclick="deleteScript('${s.id}')"><i class="fas fa-trash"></i> Xóa</div>
                            </div>
                        </div>
                    </div>
                    <div class="script-preview"><code>${escapeHtml(s.content.substring(0, 120))}${s.content.length > 120 ? '...' : ''}</code></div>
                    <div class="script-card-footer">
                        <button class="btn btn-outline" onclick="editScript('${s.id}')"><i class="fas fa-edit"></i> Sửa</button>
                        <button class="btn btn-primary" onclick="copyScriptContent('${s.id}')"><i class="fas fa-copy"></i> Copy</button>
                    </div>
                </div>
            `).join('');
        }

        function filterScripts() { loadScripts(document.getElementById('searchBox').value); }
        function toggleMenu(id) {
            const menu = document.getElementById('menu-' + id);
            document.querySelectorAll('.menu-dropdown').forEach(m => { if (m !== menu) m.classList.remove('active'); });
            menu.classList.toggle('active');
        }

        function editScript(id) {
            const scripts = JSON.parse(localStorage.getItem(`scripts_${currentUser.uid}`) || '[]');
            const s = scripts.find(x => x.id === id);
            if (s) {
                document.getElementById('scriptName').value = s.name;
                document.getElementById('scriptKey').value = s.key || '';
                document.getElementById('codeEditor').value = s.content;
                updateEditor();
                currentEditingId = id;
                document.querySelector('.btn-success').innerHTML = '<i class="fas fa-sync-alt"></i> Cập nhật';
            }
            document.querySelectorAll('.menu-dropdown').forEach(m => m.classList.remove('active'));
        }

        function deleteScript(id) {
            if (!confirm('Xóa script này?')) return;
            const storageKey = `scripts_${currentUser.uid}`;
            let scripts = JSON.parse(localStorage.getItem(storageKey) || '[]');
            scripts = scripts.filter(s => s.id !== id);
            localStorage.setItem(storageKey, JSON.stringify(scripts));
            localStorage.setItem(SYNC_KEY, Date.now().toString());
            if (currentEditingId === id) clearEditor();
            loadScripts();
            showNotification('Đã xóa!', 'info');
        }

        function copyScriptContent(id) {
            const scripts = JSON.parse(localStorage.getItem(`scripts_${currentUser.uid}`) || '[]');
            const s = scripts.find(x => x.id === id);
            if (s) {
                navigator.clipboard.writeText(s.content).then(() => showNotification('Đã copy!', 'success'));
            }
        }

        // ==================== RAW ACTION (GỘP NÚT) ====================
        async function handleRawAction() {
            const code = document.getElementById('codeEditor').value;
            const name = document.getElementById('scriptName').value.trim();
            const key = document.getElementById('scriptKey').value.trim();

            if (!code.trim()) return showNotification('Vui lòng nhập code!', 'warning');
            if (!name) return showNotification('Vui lòng đặt tên script!', 'warning');
            if (!key) return showNotification('Vui lòng nhập key bảo vệ!', 'warning');

            const btn = document.getElementById('rawActionBtn');
            const btnText = document.getElementById('rawActionText');
            const isUpdating = currentRawData && currentRawData.name;

            btn.disabled = true;
            btnText.innerHTML = '<span class="loading-spinner"></span> ' + (isUpdating ? 'Đang cập nhật...' : 'Đang tạo...');
            updateSyncStatus(isUpdating ? 'Đang cập nhật RAW...' : 'Đang tạo RAW...', true);

            const method = isUpdating ? 'PUT' : 'POST';
            const body = isUpdating 
                ? JSON.stringify({ name: currentRawData.name, code, key })
                : JSON.stringify({ code, name, key });

            try {
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 20000);
                
                const res = await fetch('/api/raw', {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body,
                    signal: controller.signal
                });
                
                clearTimeout(timeout);
                const data = await res.json();

                if (data.success) {
                    currentRawData = {
                        name: data.name,
                        storageId: data.storageId || currentRawData?.storageId,
                        url: data.raw,
                        code,
                        key
                    };
                    
                    // Lưu trạng thái
                    if (currentUser) {
                        localStorage.setItem('rawState_' + currentUser.uid, JSON.stringify(currentRawData));
                    }

                    // Hiển thị link
                    document.getElementById('rawLinkDisplay').style.display = 'block';
                    document.getElementById('rawLinkText').textContent = data.raw;
                    
                    // Đổi nút thành "Cập nhật RAW"
                    btnText.innerHTML = '<i class="fas fa-sync-alt"></i> Cập nhật RAW';
                    document.getElementById('resetRawBtn').style.display = 'inline-flex';
                    
                    showNotification(isUpdating ? '✅ RAW đã cập nhật!' : '✅ RAW đã tạo! Link đã sẵn sàng.', 'success');
                    updateSyncStatus('RAW sẵn sàng');
                    
                    // Tự copy link
                    navigator.clipboard.writeText(data.raw).catch(() => {});
                } else {
                    throw new Error(data.error || 'Thất bại');
                }
            } catch (err) {
                console.error('RAW Error:', err);
                let msg = 'Lỗi: ';
                if (err.name === 'AbortError') msg += 'Timeout!';
                else if (err.message.includes('Failed to fetch')) msg += 'Không kết nối được server!';
                else msg += err.message;
                showNotification(msg, 'error');
                updateSyncStatus('Lỗi');
            } finally {
                btn.disabled = false;
                setTimeout(() => updateSyncStatus('Sẵn sàng'), 2000);
            }
        }

        function resetRaw() {
            currentRawData = null;
            if (currentUser) localStorage.removeItem('rawState_' + currentUser.uid);
            
            const btnText = document.getElementById('rawActionText');
            btnText.innerHTML = '<i class="fas fa-shield-alt"></i> Tạo RAW';
            document.getElementById('resetRawBtn').style.display = 'none';
            document.getElementById('rawLinkDisplay').style.display = 'none';
            showNotification('Đã reset! Có thể tạo RAW mới.', 'info');
        }

        function copyRawLink() {
            const link = document.getElementById('rawLinkText').textContent;
            navigator.clipboard.writeText(link).then(() => showNotification('Đã copy link!', 'success'));
        }

        function restoreRawState() {
            if (!currentUser) return;
            const saved = localStorage.getItem('rawState_' + currentUser.uid);
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    if (Date.now() - (data.timestamp || 0) < 7 * 24 * 60 * 60 * 1000) {
                        currentRawData = data;
                        document.getElementById('rawActionText').innerHTML = '<i class="fas fa-sync-alt"></i> Cập nhật RAW';
                        document.getElementById('resetRawBtn').style.display = 'inline-flex';
                        document.getElementById('rawLinkDisplay').style.display = 'block';
                        document.getElementById('rawLinkText').textContent = data.url;
                        document.getElementById('scriptName').value = data.name || '';
                        document.getElementById('scriptKey').value = data.key || '';
                        document.getElementById('codeEditor').value = data.code || '';
                        updateEditor();
                    }
                } catch (e) {}
            }
        }

        function downloadScript() {
            const content = document.getElementById('codeEditor').value;
            const name = (document.getElementById('scriptName').value.trim() || 'script') + '.lua';
            if (!content.trim()) return showNotification('Chưa có code!', 'warning');
            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = name;
            document.body.appendChild(a); a.click();
            setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
            showNotification('Đang tải...', 'success');
        }

        // ==================== INIT ====================
        window.onclick = function(e) {
            if (e.target === document.getElementById('authModal')) closeAuthModal();
            if (!e.target.closest('.script-menu')) {
                document.querySelectorAll('.menu-dropdown').forEach(m => m.classList.remove('active'));
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            const saved = sessionStorage.getItem('apex_user');
            if (saved) {
                currentUser = JSON.parse(saved);
                updateUI();
                loadScripts();
                restoreRawState();
            }
            updateEditor();
            updateSyncStatus('Sẵn sàng');
        });
    </script>
</body>
</html>
